<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Employee Directory home screen</title>
  <desc id="desc">A preview of the employee directory dashboard with search, filters, statistics, and employee cards.</desc>
  <rect width="1200" height="760" fill="#f5f6fa"/>
  <rect width="1200" height="72" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="40" y="45" fill="#333333" font-family="Arial, sans-serif" font-size="24" font-weight="700">Employee Directory</text>
  <text x="860" y="43" fill="#666666" font-family="Arial, sans-serif" font-size="16">Home</text>
  <text x="930" y="43" fill="#666666" font-family="Arial, sans-serif" font-size="16">Favorites</text>
  <text x="1030" y="43" fill="#666666" font-family="Arial, sans-serif" font-size="16">Add Employee</text>
  <rect x="40" y="112" width="1120" height="54" rx="6" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="60" y="146" fill="#999999" font-family="Arial, sans-serif" font-size="16">Search employees</text>
  <text x="40" y="205" fill="#666666" font-family="Arial, sans-serif" font-size="14">Department</text>
  <rect x="40" y="218" width="230" height="42" rx="6" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="58" y="245" fill="#333333" font-family="Arial, sans-serif" font-size="14">All Departments</text>
  <text x="300" y="205" fill="#666666" font-family="Arial, sans-serif" font-size="14">City</text>
  <rect x="300" y="218" width="230" height="42" rx="6" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="318" y="245" fill="#333333" font-family="Arial, sans-serif" font-size="14">All Cities</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="40" y="292" width="260" height="90" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
    <text x="170" y="330" fill="#2f80ed" font-size="28" font-weight="700">30</text><text x="170" y="354" fill="#666666" font-size="13">Total Employees</text>
    <rect x="320" y="292" width="260" height="90" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
    <text x="450" y="330" fill="#2f80ed" font-size="28" font-weight="700">0</text><text x="450" y="354" fill="#666666" font-size="13">Favorites</text>
    <rect x="600" y="292" width="260" height="90" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
    <text x="730" y="330" fill="#2f80ed" font-size="28" font-weight="700">11</text><text x="730" y="354" fill="#666666" font-size="13">Departments</text>
    <rect x="880" y="292" width="280" height="90" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
    <text x="1020" y="330" fill="#2f80ed" font-size="28" font-weight="700">18</text><text x="1020" y="354" fill="#666666" font-size="13">Cities</text>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="40" y="414" width="350" height="286" rx="10" fill="#ffffff" stroke="#e0e0e0"/><circle cx="215" cy="492" r="48" fill="#d9e7fb"/><text x="215" y="575" text-anchor="middle" fill="#333333" font-size="20" font-weight="700">Emily Johnson</text><text x="215" y="603" text-anchor="middle" fill="#666666" font-size="15">Marketing Specialist</text>
    <rect x="425" y="414" width="350" height="286" rx="10" fill="#ffffff" stroke="#e0e0e0"/><circle cx="600" cy="492" r="48" fill="#f8d8b8"/><text x="600" y="575" text-anchor="middle" fill="#333333" font-size="20" font-weight="700">Michael Brown</text><text x="600" y="603" text-anchor="middle" fill="#666666" font-size="15">Product Manager</text>
    <rect x="810" y="414" width="350" height="286" rx="10" fill="#ffffff" stroke="#e0e0e0"/><circle cx="985" cy="492" r="48" fill="#d7efd9"/><text x="985" y="575" text-anchor="middle" fill="#333333" font-size="20" font-weight="700">Sophia Davis</text><text x="985" y="603" text-anchor="middle" fill="#666666" font-size="15">Software Engineer</text>
  </g>
</svg>